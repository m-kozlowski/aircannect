name: firmware
run-name: firmware release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read
  releases: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLATFORMIO_VERSION: '6.1.19'
      PLATFORMIO_BUILD_CACHE_DIR: ${{ github.workspace }}/.pio/build-cache

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache PlatformIO dependencies
        continue-on-error: true
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            .pio/libdeps
          key: >-
            ${{ runner.os }}-pio-${{ env.PLATFORMIO_VERSION }}-deps-${{
            hashFiles('platformio.ini', 'platformio-*.ini',
            'generate_libsmb2.py', '.gitmodules', 'patches/libsmb2/**',
            'third_party/libsmb2-pio/**') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ env.PLATFORMIO_VERSION }}-deps-

      - name: Cache PlatformIO build objects
        continue-on-error: true
        uses: actions/cache@v6
        with:
          path: .pio/build-cache
          key: >-
            ${{ runner.os }}-pio-${{ env.PLATFORMIO_VERSION }}-build-${{
            hashFiles('platformio.ini', 'platformio-*.ini',
            'generate_libsmb2.py', '.gitmodules', 'patches/libsmb2/**',
            'third_party/libsmb2-pio/**') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ env.PLATFORMIO_VERSION }}-build-${{ hashFiles('platformio.ini', 'platformio-*.ini', 'generate_libsmb2.py', '.gitmodules', 'patches/libsmb2/**', 'third_party/libsmb2-pio/**') }}-
            ${{ runner.os }}-pio-${{ env.PLATFORMIO_VERSION }}-build-

      - name: Create build environment
        run: |
          python3 -m venv .ci-venv
          .ci-venv/bin/python -m pip install \
            --disable-pip-version-check \
            platformio=="$PLATFORMIO_VERSION"

      - name: Build firmware artifacts
        run: |
          .ci-venv/bin/python python/tools/build_release.py \
            --pio .ci-venv/bin/pio \
            --output dist

      - name: Build release notes
        run: |
          python3 python/tools/build_release_notes.py \
            "$GITHUB_REF_NAME" \
            --output dist/RELEASE_NOTES.md

      - name: Publish Gitea release
        uses: https://gitea.com/actions/gitea-release-action@b8d9144f302c68610911db1aaf722708d5c02d94
        with:
          token: ${{ secrets.GITEA_TOKEN }}
          body_path: dist/RELEASE_NOTES.md
          files: |-
            dist/aircannect-*.bin
            dist/aircannect-*.bin.zlib
            dist/aircannect-release.json
            dist/RELEASE_NOTES.md
            dist/SHA256SUMS
