
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1120" viewBox="0 0 1200 1120" role="img" aria-labelledby="title desc">
  <title id="title">AirCANnect reference wiring</title>
  <desc id="desc">Wiring diagram for an AirCANnect build using a XIAO ESP32-S3 Plus, a 24V to 3.3V buck regulator, an SN65HVD230 CAN transceiver, and Pilot-24 cable ends. AirCurve 90W PSU builds pass CAN through from PSU to device.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .soft { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .title { font: 700 20px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .h { font: 700 17px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 14px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 12px Arial, Helvetica, sans-serif; fill: #475569; }
      .pin { font: 700 13px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .wire { fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .tap { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .p24 { stroke: #dc2626; }
      .gnd { stroke: #111827; }
      .v33 { stroke: #f59e0b; }
      .tx { stroke: #2563eb; }
      .rx { stroke: #7c3aed; }
      .canh { stroke: #16a34a; }
      .canl { stroke: #0d9488; }
      .sd { stroke: #64748b; }
      .dot24 { fill: #dc2626; }
      .dotgnd { fill: #111827; }
      .dot33 { fill: #f59e0b; }
      .dottx { fill: #2563eb; }
      .dotrx { fill: #7c3aed; }
      .dotcanh { fill: #16a34a; }
      .dotcanl { fill: #0d9488; }
      .dotsd { fill: #64748b; }
      .res { fill: #ffffff; stroke: #f59e0b; stroke-width: 2; rx: 3; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1120"/>
  <text class="title" x="40" y="42">AirCANnect reference wiring</text>
  <text class="small" x="40" y="66">Power passes through from PSU to device. AirCurve 90W PSU also requires CAN-H/CAN-L pass-through; AirCANnect taps the same CAN pair.</text>

  <rect class="box" x="40" y="105" width="220" height="235"/>
  <text class="h" x="62" y="139">Pilot-24 socket</text>
  <text class="small" x="62" y="161">ResMed PSU side</text>
  <text class="small" x="62" y="179">65W: power only; 90W: power + CAN</text>
  <text class="pin" x="62" y="207">+24V from PSU</text>
  <circle class="dot24" cx="260" cy="202" r="6"/>
  <text class="pin" x="62" y="237">GND from PSU</text>
  <circle class="dotgnd" cx="260" cy="232" r="6"/>
  <text class="pin" x="62" y="290">CAN-H from 90W PSU</text>
  <circle class="dotcanh" cx="260" cy="285" r="6"/>
  <text class="pin" x="62" y="320">CAN-L from 90W PSU</text>
  <circle class="dotcanl" cx="260" cy="315" r="6"/>

  <rect class="box" x="940" y="105" width="220" height="235"/>
  <text class="h" x="962" y="139">Pilot-24 plug</text>
  <text class="small" x="962" y="161">AirSense/AirCurve 11 side</text>
  <circle class="dot24" cx="940" cy="202" r="6"/>
  <text class="pin" x="962" y="207">pin 1  +24V</text>
  <circle class="dotgnd" cx="940" cy="232" r="6"/>
  <text class="pin" x="962" y="237">pin 4  GND</text>
  <circle class="dotcanh" cx="940" cy="285" r="6"/>
  <text class="pin" x="962" y="290">pin 2  CAN-H</text>
  <circle class="dotcanl" cx="940" cy="315" r="6"/>
  <text class="pin" x="962" y="320">pin 3  CAN-L</text>

  <rect class="box" x="365" y="365" width="210" height="155"/>
  <text class="h" x="390" y="399">Buck regulator</text>
  <text class="small" x="390" y="421">24V to 3.3V</text>
  <circle class="dot24" cx="365" cy="450" r="6"/>
  <text class="pin" x="390" y="455">IN+</text>
  <circle class="dotgnd" cx="365" cy="490" r="6"/>
  <text class="pin" x="390" y="495">GND</text>
  <circle class="dot33" cx="575" cy="450" r="6"/>
  <text class="pin" x="515" y="455">OUT+</text>
  <circle class="dotgnd" cx="575" cy="490" r="6"/>
  <text class="pin" x="520" y="495">GND</text>

  <rect class="box" x="365" y="555" width="220" height="180"/>
  <text class="h" x="390" y="589">XIAO ESP32-S3 Plus</text>
  <text class="small" x="390" y="611">controller</text>
  <circle class="dot33" cx="585" cy="610" r="6"/>
  <text class="pin" x="510" y="615">3V3</text>
  <circle class="dotgnd" cx="585" cy="640" r="6"/>
  <text class="pin" x="510" y="645">GND</text>
  <circle class="dottx" cx="585" cy="690" r="6"/>
  <text class="pin" x="440" y="695">GPIO1  CAN TX</text>
  <circle class="dotrx" cx="585" cy="710" r="6"/>
  <text class="pin" x="440" y="715">GPIO2  CAN RX</text>

  <rect class="box" x="690" y="535" width="200" height="200"/>
  <text class="h" x="715" y="569">SN65HVD230</text>
  <text class="small" x="715" y="591">3.3V CAN transceiver</text>
  <circle class="dot33" cx="690" cy="610" r="6"/>
  <text class="pin" x="715" y="615">VCC</text>
  <circle class="dotgnd" cx="690" cy="640" r="6"/>
  <text class="pin" x="715" y="645">GND</text>
  <circle class="dottx" cx="690" cy="690" r="6"/>
  <text class="pin" x="715" y="695">D / TXD</text>
  <circle class="dotrx" cx="690" cy="710" r="6"/>
  <text class="pin" x="715" y="715">R / RXD</text>
  <circle class="dotcanh" cx="890" cy="610" r="6"/>
  <text class="pin" x="825" y="615">CANH</text>
  <circle class="dotcanl" cx="890" cy="640" r="6"/>
  <text class="pin" x="825" y="645">CANL</text>

  <!-- Pass-through power to the ResMed device. -->
  <path class="wire p24" d="M260 202 H940"/>
  <path class="wire gnd" d="M260 232 H940"/>
  <text class="small" x="505" y="188">+24V pass-through</text>
  <text class="small" x="510" y="255">GND pass-through</text>

  <!-- Local power taps into buck regulator. -->
  <path class="tap p24" d="M315 202 V450 H365"/>
  <path class="tap gnd" d="M280 232 V490 H365"/>
  <circle class="dot24" cx="315" cy="202" r="6"/>
  <circle class="dotgnd" cx="280" cy="232" r="6"/>
  <text class="small" x="320" y="350">power tap</text>

  <!-- Regulated 3.3V rail. -->
  <path class="wire v33" d="M585 610 H690"/>
  <path class="wire gnd" d="M585 640 H690"/>
  <path class="tap v33" d="M575 450 H635 V610"/>
  <path class="tap gnd" d="M575 490 H625 V640"/>
  <circle class="dot33" cx="635" cy="610" r="6"/>
  <circle class="dotgnd" cx="625" cy="640" r="6"/>
  <text class="small" x="610" y="440">3.3V rail</text>

  <!-- ESP32 TWAI to transceiver logic pins. -->
  <path class="wire tx" d="M585 690 H690"/>
  <path class="wire rx" d="M585 710 H690"/>

  <!-- CAN pair pass-through and AirCANnect tap. AirCurve 90W PSU requires the
       PSU-side CAN pins; AirSense 65W can leave the PSU-side CAN pins unused. -->
  <path class="wire canh" d="M260 285 H940"/>
  <path class="wire canl" d="M260 315 H940"/>
  <path class="tap canh" d="M925 285 V610 H890"/>
  <path class="tap canl" d="M910 315 V640 H890"/>
  <circle class="dotcanh" cx="925" cy="285" r="6"/>
  <circle class="dotcanl" cx="910" cy="315" r="6"/>
  <text class="small" x="382" y="272">CAN pass-through for AirCurve 90W PSU; optional on AirSense 65W</text>
  <text class="small" x="930" y="455">CAN tap</text>

  <rect class="soft" x="40" y="755" width="1120" height="335"/>
  <text class="h" x="62" y="790">Optional microSD, 4-bit SDMMC</text>
  <text class="small" x="62" y="813">Keep wires under about 5 cm. Add 10k pull-ups from CMD and D0-D3 to 3.3V. CLK does not need a pull-up.</text>

  <rect class="box" x="70" y="845" width="280" height="240"/>
  <text class="h" x="96" y="876">XIAO ESP32-S3 Plus</text>
  <text class="small" x="96" y="898">SDMMC pins</text>

  <rect class="box" x="860" y="845" width="250" height="240"/>
  <text class="h" x="890" y="876">microSD socket</text>
  <text class="small" x="890" y="898">4-bit mode</text>

  <path class="thin v33" d="M425 835 H785"/>
  <text class="small" x="558" y="825">3.3V pull-up rail</text>

  <circle class="dot33" cx="350" cy="885" r="5"/>
  <text class="pin" x="96" y="890">3V3</text>
  <circle class="dot33" cx="860" cy="885" r="5"/>
  <text class="pin" x="890" y="890">VCC</text>
  <path class="thin v33" d="M350 885 H860"/>

  <circle class="dotgnd" cx="350" cy="910" r="5"/>
  <text class="pin" x="96" y="915">GND</text>
  <circle class="dotgnd" cx="860" cy="910" r="5"/>
  <text class="pin" x="890" y="915">GND</text>
  <path class="thin gnd" d="M350 910 H860"/>

  <circle class="dotsd" cx="350" cy="935" r="5"/>
  <text class="pin" x="96" y="940">GPIO13  SD_CLK</text>
  <circle class="dotsd" cx="860" cy="935" r="5"/>
  <text class="pin" x="890" y="940">CLK</text>
  <path class="thin sd" d="M350 935 H860"/>

  <circle class="dotsd" cx="350" cy="960" r="5"/>
  <text class="pin" x="96" y="965">GPIO11  SD_CMD</text>
  <circle class="dotsd" cx="860" cy="960" r="5"/>
  <text class="pin" x="890" y="965">CMD</text>
  <path class="thin sd" d="M350 960 H860"/>

  <circle class="dotsd" cx="350" cy="985" r="5"/>
  <text class="pin" x="96" y="990">GPIO12  SD_D0</text>
  <circle class="dotsd" cx="860" cy="985" r="5"/>
  <text class="pin" x="890" y="990">D0</text>
  <path class="thin sd" d="M350 985 H860"/>

  <circle class="dotsd" cx="350" cy="1010" r="5"/>
  <text class="pin" x="96" y="1015">GPIO38  SD_D1</text>
  <circle class="dotsd" cx="860" cy="1010" r="5"/>
  <text class="pin" x="890" y="1015">D1</text>
  <path class="thin sd" d="M350 1010 H860"/>

  <circle class="dotsd" cx="350" cy="1035" r="5"/>
  <text class="pin" x="96" y="1040">GPIO39  SD_D2</text>
  <circle class="dotsd" cx="860" cy="1035" r="5"/>
  <text class="pin" x="890" y="1040">D2</text>
  <path class="thin sd" d="M350 1035 H860"/>

  <circle class="dotsd" cx="350" cy="1060" r="5"/>
  <text class="pin" x="96" y="1065">GPIO40  SD_D3</text>
  <circle class="dotsd" cx="860" cy="1060" r="5"/>
  <text class="pin" x="890" y="1065">D3</text>
  <path class="thin sd" d="M350 1060 H860"/>

  <g aria-label="10k pull-ups">
    <path class="thin v33" d="M485 835 V940"/>
    <rect class="res" x="473" y="940" width="24" height="14"/>
    <path class="thin v33" d="M485 954 V960"/>
    <text class="small" x="466" y="931">10k</text>

    <path class="thin v33" d="M555 835 V965"/>
    <rect class="res" x="543" y="965" width="24" height="14"/>
    <path class="thin v33" d="M555 979 V985"/>
    <text class="small" x="536" y="956">10k</text>

    <path class="thin v33" d="M625 835 V990"/>
    <rect class="res" x="613" y="990" width="24" height="14"/>
    <path class="thin v33" d="M625 1004 V1010"/>
    <text class="small" x="606" y="981">10k</text>

    <path class="thin v33" d="M695 835 V1015"/>
    <rect class="res" x="683" y="1015" width="24" height="14"/>
    <path class="thin v33" d="M695 1029 V1035"/>
    <text class="small" x="676" y="1006">10k</text>

    <path class="thin v33" d="M765 835 V1040"/>
    <rect class="res" x="753" y="1040" width="24" height="14"/>
    <path class="thin v33" d="M765 1054 V1060"/>
    <text class="small" x="746" y="1031">10k</text>
  </g>
</svg>

